name: Collaboration Rules Audit

on:
  push:
    paths:
      - .github/collaboration-rules.md
  workflow_dispatch:

permissions:
  contents: read
  discussions: write
  issues: write

jobs:
  audit:
    name: Log collaboration rule changes
    runs-on: ubuntu-latest
    env:
      RULES_FILE: .github/collaboration-rules.md

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build audit record
        id: audit
        env:
          EVENT_TIMESTAMP: ${{ github.event.head_commit.timestamp || '' }}
        run: |
          CURRENT_DATE="${EVENT_TIMESTAMP:-$(date -u +"%Y-%m-%dT%H:%M:%SZ")}"
          if [ ! -e "$RULES_FILE" ]; then
            echo "Expected $RULES_FILE to exist after checkout. This indicates a workflow configuration issue." >&2
            exit 1
          fi
          if [ ! -f "$RULES_FILE" ]; then
            echo "Expected $RULES_FILE to be a regular file, but it is not." >&2
            exit 1
          fi
          if [ ! -r "$RULES_FILE" ]; then
            echo "Expected $RULES_FILE to be readable during audit, but the runner cannot read it." >&2
            exit 1
          fi
          if ! CURRENT_RULES=$(cat "$RULES_FILE"); then
            echo "Failed to read $RULES_FILE while building the collaboration rules audit record." >&2
            exit 1
          fi
          PREVIOUS_SHA="${{ github.event.before }}"

          if [ "${{ github.event_name }}" = "push" ] && \
             [ -n "$PREVIOUS_SHA" ] && \
             git rev-parse --verify "${PREVIOUS_SHA}^{commit}" >/dev/null 2>&1; then
            if git cat-file -e "${PREVIOUS_SHA}:${RULES_FILE}" 2>/dev/null; then
              PREVIOUS_RULES=$(git show "${PREVIOUS_SHA}:${RULES_FILE}")
            else
              PREVIOUS_RULES="File was created in this revision."
            fi
            RULES_DIFF=$(git diff "$PREVIOUS_SHA" "${{ github.sha }}" -- "$RULES_FILE" 2>/dev/null || true)
          else
            PREVIOUS_RULES="Manual audit run or previous version unavailable."
            RULES_DIFF="Manual audit run — no Git diff available."
          fi

          {
            echo "title=📝 Collaboration rules updated — ${CURRENT_DATE}"
            echo "body<<AUDIT_BODY_EOF"
            echo "# 📝 Collaboration Rules Audit"
            echo
            echo "- **Repository**: ${{ github.repository }}"
            echo "- **Actor**: ${{ github.actor }}"
            echo "- **Event**: ${{ github.event_name }}"
            echo "- **Commit**: ${{ github.sha }}"
            echo "- **Workflow run**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "- **Timestamp**: ${CURRENT_DATE}"
            echo
            echo "## Previous Rules"
            echo '```markdown'
            echo "$PREVIOUS_RULES"
            echo '```'
            echo
            echo "## Current Rules"
            echo '```markdown'
            echo "$CURRENT_RULES"
            echo '```'
            echo
            echo "## Change Diff"
            echo '```diff'
            echo "$RULES_DIFF"
            echo '```'
            echo "AUDIT_BODY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post audit record
        uses: ./.github/actions/post-council-results
        with:
          title: ${{ steps.audit.outputs.title }}
          body: ${{ steps.audit.outputs.body }}
          category: ${{ vars.COUNCIL_DISCUSSION_CATEGORY || 'Team Decisions' }}
          labels: ''
          token: ${{ secrets.GITHUB_TOKEN }}
