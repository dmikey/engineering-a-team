# ──────────────────────────────────────────────────────────────────────────────
# Agent Router
#
# Listens for slash-commands in issue and pull request comments, then
# dispatches the appropriate agent workflow.
#
# Supported commands:
#   /qa [context]       — Trigger QA Engineer review
#   /pm [task]          — Trigger Project Manager (groom-backlog | check-milestones | full-sprint-report | agent-performance-dashboard | roadmap-collaboration)
#   /po [task]          — Trigger Product Owner (product-health-report | suggest-features | run-playwright)
#   /council [topic]    — Trigger full council discussion
#   /profile comms ...  — Set personal communication preference
#   /help               — Post a help comment listing available commands
#
# Only repository members with write access can trigger agents.
# ──────────────────────────────────────────────────────────────────────────────
name: Agent Router

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write
  actions: write

jobs:
  route:
    name: Route agent command
    runs-on: ubuntu-latest
    env:
      REPO_OWNER: ${{ github.repository_owner }}
      REPO_NAME: ${{ github.event.repository.name }}
      ROUTER_DISCUSSION_CATEGORY: ${{ vars.AGENT_ROUTER_DISCUSSION_CATEGORY || 'General' }}
    # Only process comments that start with /
    if: |
      startsWith(github.event.comment.body, '/qa') ||
      startsWith(github.event.comment.body, '/pm') ||
      startsWith(github.event.comment.body, '/po') ||
      startsWith(github.event.comment.body, '/council') ||
      startsWith(github.event.comment.body, '/ta') ||
      startsWith(github.event.comment.body, '/profile') ||
      startsWith(github.event.comment.body, '/help')

    steps:
      # ── Verify the commenter has write access ────────────────────────────
      - name: Check commenter permissions
        id: auth
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENTER: ${{ github.event.comment.user.login }}
        run: |
          PERMISSION=$(gh api \
            "repos/${{ github.repository }}/collaborators/$COMMENTER/permission" \
            --jq '.permission' \
            2>/dev/null || echo "none")

          echo "permission=$PERMISSION" >> "$GITHUB_OUTPUT"

          if [[ "$PERMISSION" == "admin" || "$PERMISSION" == "write" || "$PERMISSION" == "maintain" ]]; then
            echo "authorized=true" >> "$GITHUB_OUTPUT"
          else
            echo "authorized=false" >> "$GITHUB_OUTPUT"
          fi

      # ── React to unauthorised commands ───────────────────────────────────
      - name: Reject unauthorized command
        if: steps.auth.outputs.authorized == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENT_URL: ${{ github.event.comment.html_url }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --body "⛔ Sorry, only repository collaborators with write access can trigger agents."

      # ── Parse command and arguments ──────────────────────────────────────
      - name: Parse command
        id: parse
        if: steps.auth.outputs.authorized == 'true'
        run: |
          BODY="${{ github.event.comment.body }}"
          COMMAND=$(echo "$BODY" | awk '{print $1}')
          ARGS=$(echo "$BODY" | cut -d' ' -f2- | xargs)

          echo "command=$COMMAND" >> "$GITHUB_OUTPUT"
          echo "args=$ARGS" >> "$GITHUB_OUTPUT"

          # Determine if this is on an issue or PR
          if [ "${{ github.event_name }}" = "pull_request_review_comment" ]; then
            echo "ref_type=pr" >> "$GITHUB_OUTPUT"
            echo "ref_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.issue.pull_request }}" ]; then
            echo "ref_type=pr" >> "$GITHUB_OUTPUT"
            echo "ref_number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref_type=issue" >> "$GITHUB_OUTPUT"
            echo "ref_number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          fi

      # ── Resolve requester communication preference ────────────────────────
      - name: Resolve communication preference
        id: prefs
        if: steps.auth.outputs.authorized == 'true'
        env:
          PREFS_JSON: ${{ vars.AGENT_COMMUNICATION_PREFERENCES || '{}' }}
          DEFAULT_CHANNEL: ${{ vars.AGENT_DEFAULT_COMMUNICATION_METHOD || 'discussion' }}
          COMMENTER: ${{ github.event.comment.user.login }}
        run: |
          CHANNEL=$(python3 - <<'PY'
          import json
          import os

          raw = os.environ.get("PREFS_JSON", "{}")
          commenter = os.environ.get("COMMENTER", "")
          default = str(os.environ.get("DEFAULT_CHANNEL", "comment")).strip().lower()
          if default not in {"comment", "issue", "discussion"}:
              default = "comment"

          try:
              prefs = json.loads(raw) if raw else {}
          except Exception:
              prefs = {}

          value = str(prefs.get(commenter, default)).strip().lower()
          if value not in {"comment", "issue", "discussion"}:
              value = default

          print(value)
          PY
          )
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"

      # ── /help ────────────────────────────────────────────────────────────
      - name: Post help message
        if: |
          steps.auth.outputs.authorized == 'true' &&
          steps.parse.outputs.command == '/help'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.parse.outputs.ref_number }}
          CHANNEL: ${{ steps.prefs.outputs.channel }}
        run: |
          HELP_BODY="## 🤖 Engineering Team Agent Commands

          | Command | Description |
          |---------|-------------|
          | \`/qa [context]\` | Trigger QA Engineer (Quinn) to review this PR or issue |
          | \`/pm [task]\` | Trigger Project Manager (Morgan) — tasks: \`groom-backlog\`, \`check-milestones\`, \`full-sprint-report\`, \`agent-performance-dashboard\`, \`roadmap-collaboration\` |
          | \`/po [task]\` | Trigger Product Owner (Alex) — tasks: \`product-health-report\`, \`suggest-features\`, \`run-playwright\` |
          | \`/council [topic]\` | Convene the full council for a discussion on this topic |
          | \`/ta [task]\` | Run the Task Assignment System — tasks: \`assign-tasks\` (default), \`workload-dashboard\` |
          | \`/profile comms [comment\|issue\|discussion]\` | Set your personal notification channel preference |
          | \`/help\` | Show this message |

          **Examples**:
          \`\`\`
          /qa please review the authentication changes
          /pm groom-backlog
          /pm roadmap-collaboration
          /po suggest-features
          /council Should we adopt TypeScript for this project?
          /ta assign-tasks
          \`\`\`

          > Only collaborators with **write access** can invoke agents.

          *🤖 [Agent Router](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*"

          if [ "$CHANNEL" = "issue" ]; then
            gh issue create \
              --title "🤖 Agent Router Help (requested from #$ISSUE_NUMBER)" \
              --body "$HELP_BODY"
          elif [ "$CHANNEL" = "discussion" ]; then
            REPO_ID=$(gh api "repos/${{ github.repository }}" --jq '.node_id' 2>/dev/null || echo "")
            CATEGORY_ID=""
            [ -n "$REPO_ID" ] && CATEGORY_ID=$(gh api graphql \
              -f query='query($o:String!,$r:String!){repository(owner:$o,name:$r){discussionCategories(first:20){nodes{id name}}}}' \
              -f o="$REPO_OWNER" -f r="$REPO_NAME" \
              --jq ".data.repository.discussionCategories.nodes[] | select(.name == \"$ROUTER_DISCUSSION_CATEGORY\") | .id" \
              2>/dev/null || echo "")

            if [ -z "$CATEGORY_ID" ]; then
              CATEGORY_ID=$(gh api graphql \
                -f query='query($o:String!,$r:String!){repository(owner:$o,name:$r){discussionCategories(first:1){nodes{id}}}}' \
                -f o="$REPO_OWNER" -f r="$REPO_NAME" \
                --jq '.data.repository.discussionCategories.nodes[0].id' \
                2>/dev/null || echo "")
            fi

            DISCUSSION_URL=""
            [ -n "$CATEGORY_ID" ] && DISCUSSION_URL=$(gh api graphql \
              -f query='mutation($ri:ID!,$ci:ID!,$t:String!,$b:String!){createDiscussion(input:{repositoryId:$ri,categoryId:$ci,title:$t,body:$b}){discussion{url}}}' \
              -f ri="$REPO_ID" -f ci="$CATEGORY_ID" \
              -f t="🤖 Agent Router Help (requested from #$ISSUE_NUMBER)" \
              -f b="$HELP_BODY" \
              --jq '.data.createDiscussion.discussion.url' \
              2>/dev/null || echo "")

            if [ -n "$DISCUSSION_URL" ]; then
              gh issue comment "$ISSUE_NUMBER" --body "✅ Posted help as a discussion: $DISCUSSION_URL"
            else
              gh issue comment "$ISSUE_NUMBER" --body "$HELP_BODY"
            fi
          else
            gh issue comment "$ISSUE_NUMBER" --body "$HELP_BODY"
          fi

      # ── /profile ─────────────────────────────────────────────────────────
      - name: Update communication preference
        if: |
          steps.auth.outputs.authorized == 'true' &&
          steps.parse.outputs.command == '/profile'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.parse.outputs.ref_number }}
          COMMENTER: ${{ github.event.comment.user.login }}
          ARGS: ${{ steps.parse.outputs.args }}
        run: |
          SUBCOMMAND=$(echo "$ARGS" | awk '{print $1}')
          METHOD=$(echo "$ARGS" | awk '{print $2}' | tr '[:upper:]' '[:lower:]')
          if [ "$SUBCOMMAND" != "comms" ] || [[ ! "$METHOD" =~ ^(comment|issue|discussion)$ ]]; then
            gh issue comment "$ISSUE_NUMBER" --body "⚠️ Usage: \`/profile comms [comment|issue|discussion]\`"
            exit 0
          fi

          VAR_ENDPOINT="repos/${{ github.repository }}/actions/variables/AGENT_COMMUNICATION_PREFERENCES"
          CURRENT=$(gh api "$VAR_ENDPOINT" --jq '.value' 2>/dev/null || echo "{}")

          UPDATED=$(CURRENT="$CURRENT" METHOD="$METHOD" COMMENTER="$COMMENTER" python3 - <<'PY'
          import json
          import os

          raw = os.environ.get("CURRENT", "{}")
          user = os.environ.get("COMMENTER", "")
          method = os.environ.get("METHOD", "comment")

          try:
              prefs = json.loads(raw) if raw else {}
          except Exception:
              prefs = {}

          prefs[user] = method
          print(json.dumps(prefs, separators=(",", ":")))
          PY
          )

          if gh api "$VAR_ENDPOINT" >/dev/null 2>&1; then
            gh api -X PATCH "$VAR_ENDPOINT" \
              -f name='AGENT_COMMUNICATION_PREFERENCES' \
              -f value="$UPDATED" >/dev/null
          else
            gh api -X POST "repos/${{ github.repository }}/actions/variables" \
              -f name='AGENT_COMMUNICATION_PREFERENCES' \
              -f value="$UPDATED" >/dev/null
          fi

          gh issue comment "$ISSUE_NUMBER" --body "✅ Updated your communication preference to **$METHOD**. You can change this any time with \`/profile comms ...\`."

      # ── /qa ──────────────────────────────────────────────────────────────
      - name: Route to QA Engineer
        if: |
          steps.auth.outputs.authorized == 'true' &&
          steps.parse.outputs.command == '/qa'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.parse.outputs.ref_number }}
          REF_TYPE: ${{ steps.parse.outputs.ref_type }}
          ARGS: ${{ steps.parse.outputs.args }}
          CHANNEL: ${{ steps.prefs.outputs.channel }}
        run: |
          # Acknowledge
          MESSAGE="🔍 Dispatching **Quinn (QA Engineer)** to review... ⏳"
          if [ "$CHANNEL" = "issue" ]; then
            gh issue create --title "🔍 QA dispatch update (re: #$ISSUE_NUMBER)" --body "$MESSAGE" 2>/dev/null || true
          elif [ "$CHANNEL" = "discussion" ]; then
            REPO_ID=$(gh api "repos/${{ github.repository }}" --jq '.node_id' 2>/dev/null || echo "")
            CATEGORY_ID=""
            [ -n "$REPO_ID" ] && CATEGORY_ID=$(gh api graphql \
              -f query='query($o:String!,$r:String!){repository(owner:$o,name:$r){discussionCategories(first:20){nodes{id name}}}}' \
              -f o="$REPO_OWNER" -f r="$REPO_NAME" \
              --jq ".data.repository.discussionCategories.nodes[] | select(.name == \"$ROUTER_DISCUSSION_CATEGORY\") | .id" \
              2>/dev/null || echo "")
            if [ -z "$CATEGORY_ID" ]; then
              CATEGORY_ID=$(gh api graphql \
                -f query='query($o:String!,$r:String!){repository(owner:$o,name:$r){discussionCategories(first:1){nodes{id}}}}' \
                -f o="$REPO_OWNER" -f r="$REPO_NAME" \
                --jq '.data.repository.discussionCategories.nodes[0].id' \
                2>/dev/null || echo "")
            fi
            DISCUSSION_URL=""
            [ -n "$CATEGORY_ID" ] && DISCUSSION_URL=$(gh api graphql \
              -f query='mutation($ri:ID!,$ci:ID!,$t:String!,$b:String!){createDiscussion(input:{repositoryId:$ri,categoryId:$ci,title:$t,body:$b}){discussion{url}}}' \
              -f ri="$REPO_ID" -f ci="$CATEGORY_ID" \
              -f t="🔍 QA dispatch update (re: #$ISSUE_NUMBER)" \
              -f b="$MESSAGE" \
              --jq '.data.createDiscussion.discussion.url' \
              2>/dev/null || echo "")
            if [ -n "$DISCUSSION_URL" ]; then
              gh issue comment "$ISSUE_NUMBER" --body "✅ Posted QA dispatch update as a discussion: $DISCUSSION_URL" 2>/dev/null || true
            else
              gh issue comment "$ISSUE_NUMBER" --body "$MESSAGE" 2>/dev/null || true
            fi
          else
            gh issue comment "$ISSUE_NUMBER" --body "$MESSAGE" 2>/dev/null || true
          fi

          # Dispatch QA Engineer workflow
          if [ "$REF_TYPE" = "pr" ]; then
            gh workflow run qa-engineer.yml \
              -f pr_number="$ISSUE_NUMBER" \
              -f extra_context="$ARGS" \
              2>/dev/null || \
            gh issue comment "$ISSUE_NUMBER" \
              --body "⚠️ Could not dispatch QA Engineer workflow. Check that the workflow file exists and Actions are enabled."
          else
            gh workflow run qa-engineer.yml \
              -f extra_context="Issue #$ISSUE_NUMBER: $ARGS" \
              2>/dev/null || \
            gh issue comment "$ISSUE_NUMBER" \
              --body "⚠️ Could not dispatch QA Engineer workflow."
          fi

      # ── /pm ──────────────────────────────────────────────────────────────
      - name: Route to Project Manager
        if: |
          steps.auth.outputs.authorized == 'true' &&
          steps.parse.outputs.command == '/pm'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.parse.outputs.ref_number }}
          ARGS: ${{ steps.parse.outputs.args }}
          CHANNEL: ${{ steps.prefs.outputs.channel }}
        run: |
          # Determine task
          TASK="full-sprint-report"
          PERIOD_DAYS=""
          SORT_BY=""
          case "$ARGS" in
            groom-backlog*)     TASK="groom-backlog" ;;
            check-milestones*)  TASK="check-milestones" ;;
            full-sprint-report*) TASK="full-sprint-report" ;;
            agent-performance-dashboard*) TASK="agent-performance-dashboard" ;;
            roadmap-collaboration*) TASK="roadmap-collaboration" ;;
          esac

          if [ "$TASK" = "agent-performance-dashboard" ]; then
            PERIOD_DAYS=$(echo "$ARGS" | grep -oE 'period=[0-9]+' | head -n1 | cut -d= -f2 || true)
            SORT_BY=$(echo "$ARGS" | grep -oE 'sort=(success-rate|runs|failures|avg-duration|last-run)' | head -n1 | cut -d= -f2 || true)
          fi

          MESSAGE="📋 Dispatching **Morgan (Project Manager)** for task: \`$TASK\`... ⏳"
          if [ "$TASK" = "agent-performance-dashboard" ]; then
            [ -n "$PERIOD_DAYS" ] && MESSAGE="$MESSAGE"$'\n'"• Period: \`$PERIOD_DAYS\` days"
            [ -n "$SORT_BY" ] && MESSAGE="$MESSAGE"$'\n'"• Sort: \`$SORT_BY\`"
          fi
          if [ "$CHANNEL" = "issue" ]; then
            gh issue create --title "📋 PM dispatch update (re: #$ISSUE_NUMBER)" --body "$MESSAGE" 2>/dev/null || true
          elif [ "$CHANNEL" = "discussion" ]; then
            REPO_ID=$(gh api "repos/${{ github.repository }}" --jq '.node_id' 2>/dev/null || echo "")
            CATEGORY_ID=""
            [ -n "$REPO_ID" ] && CATEGORY_ID=$(gh api graphql \
              -f query='query($o:String!,$r:String!){repository(owner:$o,name:$r){discussionCategories(first:20){nodes{id name}}}}' \
              -f o="$REPO_OWNER" -f r="$REPO_NAME" \
              --jq ".data.repository.discussionCategories.nodes[] | select(.name == \"$ROUTER_DISCUSSION_CATEGORY\") | .id" \
              2>/dev/null || echo "")
            if [ -z "$CATEGORY_ID" ]; then
              CATEGORY_ID=$(gh api graphql \
                -f query='query($o:String!,$r:String!){repository(owner:$o,name:$r){discussionCategories(first:1){nodes{id}}}}' \
                -f o="$REPO_OWNER" -f r="$REPO_NAME" \
                --jq '.data.repository.discussionCategories.nodes[0].id' \
                2>/dev/null || echo "")
            fi
            DISCUSSION_URL=""
            [ -n "$CATEGORY_ID" ] && DISCUSSION_URL=$(gh api graphql \
              -f query='mutation($ri:ID!,$ci:ID!,$t:String!,$b:String!){createDiscussion(input:{repositoryId:$ri,categoryId:$ci,title:$t,body:$b}){discussion{url}}}' \
              -f ri="$REPO_ID" -f ci="$CATEGORY_ID" \
              -f t="📋 PM dispatch update (re: #$ISSUE_NUMBER)" \
              -f b="$MESSAGE" \
              --jq '.data.createDiscussion.discussion.url' \
              2>/dev/null || echo "")
            if [ -n "$DISCUSSION_URL" ]; then
              gh issue comment "$ISSUE_NUMBER" --body "✅ Posted PM dispatch update as a discussion: $DISCUSSION_URL" 2>/dev/null || true
            else
              gh issue comment "$ISSUE_NUMBER" --body "$MESSAGE" 2>/dev/null || true
            fi
          else
            gh issue comment "$ISSUE_NUMBER" --body "$MESSAGE" 2>/dev/null || true
          fi

          if [ "$TASK" = "roadmap-collaboration" ]; then
            ROADMAP_FOCUS=$(echo "$ARGS" | sed -E 's/^roadmap-collaboration[[:space:]]*//')
            gh workflow run roadmap-collaboration.yml \
              -f horizon="30/60/90 days" \
              -f focus="$ROADMAP_FOCUS" \
              2>/dev/null || \
            gh issue comment "$ISSUE_NUMBER" \
              --body "⚠️ Could not dispatch Roadmap Collaboration workflow."
          elif [ "$TASK" = "agent-performance-dashboard" ]; then
            DASHBOARD_ARGS=(-f task="$TASK" -f extra_context="$ARGS")
            [ -n "$PERIOD_DAYS" ] && DASHBOARD_ARGS+=(-f "metrics_period_days=$PERIOD_DAYS")
            [ -n "$SORT_BY" ] && DASHBOARD_ARGS+=(-f "metrics_sort_by=$SORT_BY")
            gh workflow run project-manager.yml "${DASHBOARD_ARGS[@]}" 2>/dev/null || \
              gh issue comment "$ISSUE_NUMBER" \
                --body "⚠️ Could not dispatch Project Manager workflow."
          else
            gh workflow run project-manager.yml \
              -f task="$TASK" \
              -f extra_context="$ARGS" \
              2>/dev/null || \
            gh issue comment "$ISSUE_NUMBER" \
              --body "⚠️ Could not dispatch Project Manager workflow."
          fi

      # ── /po ──────────────────────────────────────────────────────────────
      - name: Route to Product Owner
        if: |
          steps.auth.outputs.authorized == 'true' &&
          steps.parse.outputs.command == '/po'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.parse.outputs.ref_number }}
          ARGS: ${{ steps.parse.outputs.args }}
          CHANNEL: ${{ steps.prefs.outputs.channel }}
        run: |
          TASK="product-health-report"
          case "$ARGS" in
            suggest-features*)    TASK="suggest-features" ;;
            run-playwright*)      TASK="run-playwright" ;;
            product-health-report*) TASK="product-health-report" ;;
          esac

          MESSAGE="🧪 Dispatching **Alex (Product Owner)** for task: \`$TASK\`... ⏳"
          if [ "$CHANNEL" = "issue" ]; then
            gh issue create --title "🧪 PO dispatch update (re: #$ISSUE_NUMBER)" --body "$MESSAGE" 2>/dev/null || true
          elif [ "$CHANNEL" = "discussion" ]; then
            REPO_ID=$(gh api "repos/${{ github.repository }}" --jq '.node_id' 2>/dev/null || echo "")
            CATEGORY_ID=""
            [ -n "$REPO_ID" ] && CATEGORY_ID=$(gh api graphql \
              -f query='query($o:String!,$r:String!){repository(owner:$o,name:$r){discussionCategories(first:20){nodes{id name}}}}' \
              -f o="$REPO_OWNER" -f r="$REPO_NAME" \
              --jq ".data.repository.discussionCategories.nodes[] | select(.name == \"$ROUTER_DISCUSSION_CATEGORY\") | .id" \
              2>/dev/null || echo "")
            if [ -z "$CATEGORY_ID" ]; then
              CATEGORY_ID=$(gh api graphql \
                -f query='query($o:String!,$r:String!){repository(owner:$o,name:$r){discussionCategories(first:1){nodes{id}}}}' \
                -f o="$REPO_OWNER" -f r="$REPO_NAME" \
                --jq '.data.repository.discussionCategories.nodes[0].id' \
                2>/dev/null || echo "")
            fi
            DISCUSSION_URL=""
            [ -n "$CATEGORY_ID" ] && DISCUSSION_URL=$(gh api graphql \
              -f query='mutation($ri:ID!,$ci:ID!,$t:String!,$b:String!){createDiscussion(input:{repositoryId:$ri,categoryId:$ci,title:$t,body:$b}){discussion{url}}}' \
              -f ri="$REPO_ID" -f ci="$CATEGORY_ID" \
              -f t="🧪 PO dispatch update (re: #$ISSUE_NUMBER)" \
              -f b="$MESSAGE" \
              --jq '.data.createDiscussion.discussion.url' \
              2>/dev/null || echo "")
            if [ -n "$DISCUSSION_URL" ]; then
              gh issue comment "$ISSUE_NUMBER" --body "✅ Posted PO dispatch update as a discussion: $DISCUSSION_URL" 2>/dev/null || true
            else
              gh issue comment "$ISSUE_NUMBER" --body "$MESSAGE" 2>/dev/null || true
            fi
          else
            gh issue comment "$ISSUE_NUMBER" --body "$MESSAGE" 2>/dev/null || true
          fi

          gh workflow run product-owner.yml \
            -f task="$TASK" \
            2>/dev/null || \
          gh issue comment "$ISSUE_NUMBER" \
            --body "⚠️ Could not dispatch Product Owner workflow."

      # ── /council ─────────────────────────────────────────────────────────
      - name: Route to Council Discussion
        if: |
          steps.auth.outputs.authorized == 'true' &&
          steps.parse.outputs.command == '/council'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.parse.outputs.ref_number }}
          ARGS: ${{ steps.parse.outputs.args }}
          CHANNEL: ${{ steps.prefs.outputs.channel }}
        run: |
          TOPIC="$ARGS"
          if [ -z "$TOPIC" ]; then
            TOPIC="Review of issue/PR #$ISSUE_NUMBER"
          fi

          MESSAGE="🏛️ Convening the **Engineering Council**... ⏳"
          if [ "$CHANNEL" = "issue" ]; then
            gh issue create --title "🏛️ Council dispatch update (re: #$ISSUE_NUMBER)" --body "$MESSAGE" 2>/dev/null || true
          elif [ "$CHANNEL" = "discussion" ]; then
            REPO_ID=$(gh api "repos/${{ github.repository }}" --jq '.node_id' 2>/dev/null || echo "")
            CATEGORY_ID=""
            [ -n "$REPO_ID" ] && CATEGORY_ID=$(gh api graphql \
              -f query='query($o:String!,$r:String!){repository(owner:$o,name:$r){discussionCategories(first:20){nodes{id name}}}}' \
              -f o="$REPO_OWNER" -f r="$REPO_NAME" \
              --jq ".data.repository.discussionCategories.nodes[] | select(.name == \"$ROUTER_DISCUSSION_CATEGORY\") | .id" \
              2>/dev/null || echo "")
            if [ -z "$CATEGORY_ID" ]; then
              CATEGORY_ID=$(gh api graphql \
                -f query='query($o:String!,$r:String!){repository(owner:$o,name:$r){discussionCategories(first:1){nodes{id}}}}' \
                -f o="$REPO_OWNER" -f r="$REPO_NAME" \
                --jq '.data.repository.discussionCategories.nodes[0].id' \
                2>/dev/null || echo "")
            fi
            DISCUSSION_URL=""
            [ -n "$CATEGORY_ID" ] && DISCUSSION_URL=$(gh api graphql \
              -f query='mutation($ri:ID!,$ci:ID!,$t:String!,$b:String!){createDiscussion(input:{repositoryId:$ri,categoryId:$ci,title:$t,body:$b}){discussion{url}}}' \
              -f ri="$REPO_ID" -f ci="$CATEGORY_ID" \
              -f t="🏛️ Council dispatch update (re: #$ISSUE_NUMBER)" \
              -f b="$MESSAGE" \
              --jq '.data.createDiscussion.discussion.url' \
              2>/dev/null || echo "")
            if [ -n "$DISCUSSION_URL" ]; then
              gh issue comment "$ISSUE_NUMBER" --body "✅ Posted council dispatch update as a discussion: $DISCUSSION_URL" 2>/dev/null || true
            else
              gh issue comment "$ISSUE_NUMBER" --body "$MESSAGE" 2>/dev/null || true
            fi
          else
            gh issue comment "$ISSUE_NUMBER" --body "$MESSAGE" 2>/dev/null || true
          fi

          gh workflow run council-discussion.yml \
            -f topic="$TOPIC" \
            -f issue_number="$ISSUE_NUMBER" \
            2>/dev/null || \
          gh issue comment "$ISSUE_NUMBER" \
            --body "⚠️ Could not dispatch Council Discussion workflow."

      # ── /ta ──────────────────────────────────────────────────────────────
      - name: Route to Task Assignment System
        if: |
          steps.auth.outputs.authorized == 'true' &&
          steps.parse.outputs.command == '/ta'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.parse.outputs.ref_number }}
          ARGS: ${{ steps.parse.outputs.args }}
          CHANNEL: ${{ steps.prefs.outputs.channel }}
        run: |
          TASK="assign-tasks"
          case "$ARGS" in
            workload-dashboard*) TASK="workload-dashboard" ;;
            assign-tasks*)       TASK="assign-tasks" ;;
          esac

          MESSAGE="🎯 Dispatching **Task Assignment System** for task: \`$TASK\`... ⏳"
          if [ "$CHANNEL" = "issue" ]; then
            gh issue create --title "🎯 Task Assignment dispatch (re: #$ISSUE_NUMBER)" --body "$MESSAGE" 2>/dev/null || true
          elif [ "$CHANNEL" = "discussion" ]; then
            REPO_ID=$(gh api "repos/${{ github.repository }}" --jq '.node_id' 2>/dev/null || echo "")
            CATEGORY_ID=""
            [ -n "$REPO_ID" ] && CATEGORY_ID=$(gh api graphql \
              -f query='query($o:String!,$r:String!){repository(owner:$o,name:$r){discussionCategories(first:20){nodes{id name}}}}' \
              -f o="$REPO_OWNER" -f r="$REPO_NAME" \
              --jq ".data.repository.discussionCategories.nodes[] | select(.name == \"$ROUTER_DISCUSSION_CATEGORY\") | .id" \
              2>/dev/null || echo "")
            if [ -z "$CATEGORY_ID" ]; then
              CATEGORY_ID=$(gh api graphql \
                -f query='query($o:String!,$r:String!){repository(owner:$o,name:$r){discussionCategories(first:1){nodes{id}}}}' \
                -f o="$REPO_OWNER" -f r="$REPO_NAME" \
                --jq '.data.repository.discussionCategories.nodes[0].id' \
                2>/dev/null || echo "")
            fi
            DISCUSSION_URL=""
            [ -n "$CATEGORY_ID" ] && DISCUSSION_URL=$(gh api graphql \
              -f query='mutation($ri:ID!,$ci:ID!,$t:String!,$b:String!){createDiscussion(input:{repositoryId:$ri,categoryId:$ci,title:$t,body:$b}){discussion{url}}}' \
              -f ri="$REPO_ID" -f ci="$CATEGORY_ID" \
              -f t="🎯 Task Assignment dispatch (re: #$ISSUE_NUMBER)" \
              -f b="$MESSAGE" \
              --jq '.data.createDiscussion.discussion.url' \
              2>/dev/null || echo "")
            if [ -n "$DISCUSSION_URL" ]; then
              gh issue comment "$ISSUE_NUMBER" --body "✅ Posted task assignment dispatch update as a discussion: $DISCUSSION_URL" 2>/dev/null || true
            else
              gh issue comment "$ISSUE_NUMBER" --body "$MESSAGE" 2>/dev/null || true
            fi
          else
            gh issue comment "$ISSUE_NUMBER" --body "$MESSAGE" 2>/dev/null || true
          fi

          gh workflow run task-assignment.yml \
            -f task="$TASK" \
            -f extra_context="Issue #$ISSUE_NUMBER: $ARGS" \
            2>/dev/null || \
          gh issue comment "$ISSUE_NUMBER" \
            --body "⚠️ Could not dispatch Task Assignment workflow. Check that the workflow file exists and Actions are enabled."
