name: 'Call GitHub Model'
description: >
  Invoke a GitHub Models API endpoint and return the text response.
  All agent AI calls must go through this action.

inputs:
  model:
    description: 'Model identifier (e.g. gpt-4o-mini, gpt-4o)'
    default: 'gpt-4o-mini'
  system-prompt:
    description: 'System prompt defining the agent persona and instructions'
    required: true
  user-prompt:
    description: 'User message — the context or question for the agent'
    required: true
  temperature:
    description: 'Sampling temperature (0.0–1.0)'
    default: '0.7'
  max-tokens:
    description: 'Maximum tokens in the response'
    default: '2048'
  token:
    description: 'GitHub token or Models API token (needs models:read scope)'
    required: true

outputs:
  response:
    description: 'Plain-text response from the model'
    value: ${{ steps.invoke.outputs.response }}
  raw-json:
    description: 'Full JSON response body (for advanced parsing)'
    value: ${{ steps.invoke.outputs.raw_json }}

runs:
  using: composite
  steps:
    - name: Invoke GitHub Model
      id: invoke
      shell: bash
      env:
        GH_MODEL: ${{ inputs.model }}
        SYSTEM_PROMPT: ${{ inputs.system-prompt }}
        USER_PROMPT: ${{ inputs.user-prompt }}
        TEMPERATURE: ${{ inputs.temperature }}
        MAX_TOKENS: ${{ inputs.max-tokens }}
        API_TOKEN: ${{ inputs.token }}
        RULES_FILE: ${{ github.workspace }}/.github/collaboration-rules.md
      run: |
        PROMPT_FILE=$(mktemp)
        python3 - <<'PYEOF' > "$PROMPT_FILE"
        import os
        import re
        from pathlib import Path
        
        def validate_rules(rules: str, rules_file: Path) -> None:
            if not rules:
                raise SystemExit(
                    f"Collaboration rules file {rules_file} is empty. "
                    "Add markdown headings and rule items, or remove the file if shared rules are not needed."
                )

            if "\x00" in rules:
                raise SystemExit(
                    f"Collaboration rules file {rules_file} contains NUL bytes. "
                    "Use plain UTF-8 markdown text."
                )

            has_heading = re.search(r"(?m)^#{1,6}[ \t]+\S", rules) is not None
            has_list_item = re.search(r"(?m)^(?:[-*][ \t]+\S|\d+\.[ \t]+\S)", rules) is not None
            if not has_heading or not has_list_item:
                raise SystemExit(
                    f"Collaboration rules file {rules_file} must be valid markdown with at least one heading "
                    "and one ordered or unordered list item."
                )

        system_prompt = os.environ.get("SYSTEM_PROMPT")
        if system_prompt is None:
            raise SystemExit("Missing required input: system-prompt. This should be provided by the workflow calling this action.")
        
        rules_file_value = os.environ.get("RULES_FILE")
        if rules_file_value is None:
            raise SystemExit("Missing required environment variable: RULES_FILE. This should be set automatically by this action - please report this as an action implementation bug.")
        
        prompt = system_prompt.rstrip()
        rules_file = Path(rules_file_value)
        
        if rules_file.is_file():
            try:
                rules = rules_file.read_text(encoding="utf-8").strip()
            except (OSError, UnicodeDecodeError) as exc:
                raise SystemExit(f"Failed to read collaboration rules file {rules_file}: {exc}")
            else:
                validate_rules(rules, rules_file)
                prompt = f"{prompt}\n\nFollow these repository collaboration rules for agent interaction and decision-making:\n\n{rules}"
        
        print(prompt)
        PYEOF
        EFFECTIVE_SYSTEM_PROMPT=$(cat "$PROMPT_FILE")
        rm -f "$PROMPT_FILE"
        export EFFECTIVE_SYSTEM_PROMPT

        # Build JSON payload using Python to safely handle special characters
        PAYLOAD=$(python3 - <<'PYEOF'
        import json, os
        payload = {
            "model":       os.environ["GH_MODEL"],
            "temperature": float(os.environ["TEMPERATURE"]),
            "max_tokens":  int(os.environ["MAX_TOKENS"]),
            "messages": [
                {"role": "system", "content": os.environ["EFFECTIVE_SYSTEM_PROMPT"]},
                {"role": "user",   "content": os.environ["USER_PROMPT"]}
            ]
        }
        print(json.dumps(payload))
        PYEOF
        )

        RAW=$(curl -s \
          -X POST \
          -H "Authorization: Bearer $API_TOKEN" \
          -H "Content-Type: application/json" \
          -H "Accept: application/json" \
          "https://models.inference.ai.azure.com/chat/completions" \
          -d "$PAYLOAD")

        # Capture raw JSON
        {
          echo "raw_json<<GH_RAW_EOF"
          echo "$RAW"
          echo "GH_RAW_EOF"
        } >> "$GITHUB_OUTPUT"

        # Extract text response (fall back to diagnostic error message)
        CONTENT=$(echo "$RAW" | python3 -c "
        import json, sys
        try:
            data = json.load(sys.stdin)
        except json.JSONDecodeError as e:
            print(f'⚠️ Model call failed: could not parse response JSON — {e}')
            sys.exit(0)
        choices = data.get('choices', [])
        if choices:
            print(choices[0]['message']['content'])
        else:
            err   = data.get('error', {})
            msg   = err.get('message', 'no choices returned')
            code  = err.get('code', '')
            status = err.get('status', '')
            detail = f'code={code}, status={status}' if (code or status) else 'no error detail'
            print(f'⚠️ Model call failed: {msg} ({detail})')
        " 2>/dev/null || echo "⚠️ Failed to parse model response — check workflow logs for raw API output")

        {
          echo "response<<GH_RESP_EOF"
          echo "$CONTENT"
          echo "GH_RESP_EOF"
        } >> "$GITHUB_OUTPUT"
