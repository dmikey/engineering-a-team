# Agent Configuration
#
# This file documents all configuration knobs for the Engineering Team
# agent system.  The actual values are read from GitHub repository
# variables (Settings → Secrets and variables → Variables).
#
# Workflow defaults are shown below; override any value by creating the
# corresponding repository variable with the same name.

# ─── Model Settings ──────────────────────────────────────────────────────────

# Default model used by all agents unless overridden per-agent.
# Supported: gpt-4o, gpt-4o-mini, Meta-Llama-3.1-70B-Instruct, etc.
# Repository variable: AGENT_MODEL
default_model: gpt-4o-mini

# Model used by the Council Moderator (higher capability recommended).
# Repository variable: COUNCIL_MODEL
council_model: gpt-4o

# Maximum tokens for each model response.
# Repository variable: AGENT_MAX_TOKENS
max_tokens: 2048

# Sampling temperature (0.0 = deterministic, 1.0 = creative).
# Repository variable: AGENT_TEMPERATURE
temperature: "0.7"

# ─── Collaboration Rules ───────────────────────────────────────────────────────

# Shared collaboration rules loaded dynamically into every GitHub Models call.
# Edit .github/collaboration-rules.md to customize agent interaction and
# decision-making behaviour without changing workflow YAML or restarting agents.
# Changes are logged by the Collaboration Rules Audit workflow.

# ─── Authentication ───────────────────────────────────────────────────────────

# The built-in GITHUB_TOKEN is used by default.
# To access GitHub Models you may need a PAT with the `models:read` scope.
# Store it as a repository secret named MODELS_TOKEN.
# If MODELS_TOKEN is not set, workflows fall back to GITHUB_TOKEN.

# ─── QA Engineer ─────────────────────────────────────────────────────────────

qa_engineer:
  # Enable or disable the QA Engineer agent.
  # Repository variable: QA_ENABLED (true/false)
  enabled: true

  # Model override for QA Engineer.
  # Repository variable: QA_MODEL
  model: gpt-4o-mini

  # Minimum severity that triggers an Issue being opened.
  # Repository variable: QA_SEVERITY_THRESHOLD (LOW/MEDIUM/HIGH/CRITICAL)
  severity_threshold: HIGH

  # Labels that must exist in the repository for QA to apply them.
  # Create them under Settings → Labels before first run.
  labels:
    - bug
    - qa-review
    - security

# ─── Project Manager ─────────────────────────────────────────────────────────

project_manager:
  # Enable or disable the Project Manager agent.
  # Repository variable: PM_ENABLED (true/false)
  enabled: true

  # Model override for Project Manager.
  # Repository variable: PM_MODEL
  model: gpt-4o-mini

  # Cron schedule for backlog grooming (UTC).
  # Defined in .github/workflows/project-manager.yml.
  schedule: "0 9 * * 1-5"   # Every weekday at 09:00 UTC

  # Number of days before a milestone due date to begin drift detection.
  # Repository variable: PM_MILESTONE_LOOKAHEAD_DAYS
  milestone_lookahead_days: 30

  # Priority labels that the PM agent will apply.
  labels:
    - "priority: critical"
    - "priority: high"
    - "priority: medium"
    - "priority: low"
    - blocked

# ─── Product Owner ───────────────────────────────────────────────────────────

product_owner:
  # Enable or disable the Product Owner agent.
  # Repository variable: PO_ENABLED (true/false)
  enabled: true

  # Model override for Product Owner.
  # Repository variable: PO_MODEL
  model: gpt-4o-mini

  # Cron schedule for product health checks (UTC).
  # Defined in .github/workflows/product-owner.yml.
  schedule: "0 13 * * 1-5"   # Every weekday at 13:00 UTC

  # Automatically run Playwright tests when playwright.config.* is detected.
  # Repository variable: PO_RUN_PLAYWRIGHT (true/false)
  run_playwright: true

  # Labels applied to feature requests opened by the PO.
  labels:
    - feature
    - product-owner

# ─── Self-Improvement Loop ──────────────────────────────────────────────────

self_improvement:
  # Enable or disable the self-improvement evaluator.
  # Repository variable: SELF_IMPROVEMENT_ENABLED (true/false)
  enabled: true

  # Model override for the self-improvement evaluator.
  # Repository variable: SELF_IMPROVEMENT_MODEL
  model: gpt-4o-mini

  # Cron schedule for the evaluation loop (UTC).
  # Defined in .github/workflows/self-improvement-loop.yml.
  schedule: "0 17 * * 1-5"   # Every weekday at 17:00 UTC

  # Owner/repo for the benchmark application repository.
  # Defaults to the current repository when unset.
  # Repository variable: REFERENCE_APP_REPO
  reference_app_repo: ""

  # Optional live URL for browser-based benchmark checks.
  # Repository variable: REFERENCE_APP_BASE_URL
  reference_app_base_url: ""

  # Optional assignee used for native GitHub Copilot handoff when supported.
  # Repository variable: COPILOT_ASSIGNEE
  copilot_assignee: ""

# ─── Task Assignment System ──────────────────────────────────────────────────

task_assignment:
  # Enable or disable the task assignment workflow.
  # Repository variable: TA_ENABLED (true/false)
  enabled: true

  # Model override for the task assignment system.
  # Inherits PM_MODEL then falls back to default_model when unset.
  # Repository variable: TA_MODEL
  model: gpt-4o-mini

  # Cron schedule for automatic assignment runs (UTC).
  # Defined in .github/workflows/task-assignment.yml.
  schedule: "0 11 * * 1-5"   # Every weekday at 11:00 UTC

  # Performance window in days used to compute success-rate scores.
  performance_window_days: 30

  # Workload window in hours used to assess recent agent activity.
  workload_window_hours: 24

  # Minimum confidence level for posting issue comments (HIGH | MEDIUM).
  # LOW-confidence assignments are shown only in the dashboard.
  min_comment_confidence: MEDIUM

# ─── Skill Development Suggestions ──────────────────────────────────────────

skill_development:
  # Enable or disable the skill development suggestions workflow task.
  # The task is triggered manually via `/pm skill-development-suggestions`
  # or the workflow_dispatch / workflow_call task input.
  enabled: true

  # Number of days of workflow run history to analyse for suggestions.
  # Uses the same metrics_period_days input as agent-performance-dashboard.
  # Defaults to 30 when unset.
  period_days: 30

  # JSON map of agent names to boolean opt-in flags for reminder
  # notifications. Agents set to true receive a reminder badge in the
  # report and can be targeted by future scheduled reminder issues.
  # Repository variable: SKILL_REMINDERS_OPT_IN
  # Example: {"Quinn (QA Engineer)": true, "Morgan (Project Manager)": false}
  skill_reminders_opt_in: "{}"

# ─── Council ─────────────────────────────────────────────────────────────────

council:
  # Enable or disable the council discussion workflow.
  # Repository variable: COUNCIL_ENABLED (true/false)
  enabled: true

  # Model used by the Council Moderator.
  # Repository variable: COUNCIL_MODEL
  model: gpt-4o

  # GitHub Discussion category to post council decisions into.
  # If the category does not exist or Discussions are disabled,
  # a labeled Issue is created as fallback.
  # Repository variable: COUNCIL_DISCUSSION_CATEGORY
  discussion_category: "Team Decisions"

  # Label used to request a council review on an issue or PR.
  trigger_label: council-review

  # Additional automated council cadence for product decisions.
  # Defined in .github/workflows/council-discussion.yml.
  # - Weekdays at 14:30 UTC (scheduled sweep)
  # - On successful completion of Product Owner Agent workflow

# ─── Council Sprint Prioritization ───────────────────────────────────────────

council_sprint_prioritization:
  # Enable or disable the council sprint prioritization workflow.
  # Repository variable: COUNCIL_ENABLED (true/false) — shares the council flag
  enabled: true

  # Model used by the Council Moderator for sprint synthesis.
  # Repository variable: COUNCIL_MODEL
  model: gpt-4o

  # GitHub Discussion category to post the ranked sprint backlog into.
  # Repository variable: COUNCIL_DISCUSSION_CATEGORY
  discussion_category: "Team Decisions"

  # Labels applied to the sprint prioritization result Issue (fallback).
  labels:
    - council-decision
    - sprint-report

  # Automated sprint prioritization cadence.
  # Defined in .github/workflows/council-sprint-prioritization.yml.
  # - Every Monday at 08:00 UTC (start-of-sprint sweep)
  # - On demand via /council sprint-prioritization slash-command
  # - Manually via Manual Agent Runner (agent: council-sprint)
  schedule: "0 8 * * 1"   # Every Monday at 08:00 UTC

# ─── Agent Router ────────────────────────────────────────────────────────────

router:
  # Default communication method used when a user has not set a personal
  # preference. Repository variable: AGENT_DEFAULT_COMMUNICATION_METHOD
  # Options: comment | issue | discussion
  default_communication_method: discussion

  # Optional JSON map of per-user communication preferences.
  # Repository variable: AGENT_COMMUNICATION_PREFERENCES
  # Example: {"octocat":"discussion","alice":"issue"}
  communication_preferences: "{}"

  # Discussion category name used when posting router notifications as
  # discussions. Falls back to the first available category.
  # Repository variable: AGENT_ROUTER_DISCUSSION_CATEGORY
  discussion_category: "General"

  # Map of slash-commands to workflow file names.
  commands:
    "/qa":       qa-engineer.yml
    "/pm":       project-manager.yml
    "/po":       product-owner.yml
    "/council":  council-discussion.yml
    "/profile":  agent-router.yml

# ─── Roadmap Collaboration ───────────────────────────────────────────────────

roadmap_collaboration:
  # Weekly PM + PO roadmap alignment workflow.
  # Defined in .github/workflows/roadmap-collaboration.yml.
  enabled: true

  # Weekly schedule in UTC.
  schedule: "0 15 * * 1"   # Monday 15:00 UTC
